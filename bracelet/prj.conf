# ==========================================================
# SYSTEM, KERNEL & MEMORIES
# ==========================================================
CONFIG_HEAP_MEM_POOL_SIZE=24576
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_EVENTS=y

# ==========================================================
# CONSOLE & LOGGING
# ==========================================================
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# ==========================================================
# WI-FI CORE & PHYSICAL INTERFACE
# ==========================================================
CONFIG_SPI=y
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_NET_L2_WIFI_MGMT=y

# ==========================================================
# NETWORKING STACK
# ==========================================================
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_OFFLOAD=n
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_ETHERNET_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096

# ==========================================================
# WI-FI SCAN SETTINGS (Defaults)
# ==========================================================
CONFIG_WIFI_SCAN_BANDS_LIST="2,5"
CONFIG_WIFI_SCAN_INTERVAL_S=15

# ==========================================================
# ADXL367 ACCELEROMETER SETTINGS
# ==========================================================
CONFIG_SENSOR=y
CONFIG_ADXL367=y
CONFIG_SENSOR_ASYNC_API=y
CONFIG_ADXL367_TRIGGER_GLOBAL_THREAD=y