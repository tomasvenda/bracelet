# ==========================================================
# SYSTEM, KERNEL & MEMORIES
# ==========================================================
CONFIG_HEAP_MEM_POOL_SIZE=81920         
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192 
CONFIG_EVENTS=y

# ==========================================================
# CONSOLE & LOGGING
# ==========================================================
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y

# ==========================================================
# ADXL367 HARDWARE ACTIVITY DETECTION
# ==========================================================
CONFIG_I2C=y
CONFIG_SENSOR=y
CONFIG_ADXL367=y
CONFIG_SENSOR_ASYNC_API=y
CONFIG_ADXL367_TRIGGER_GLOBAL_THREAD=y

CONFIG_ADXL367_ACTIVITY_DETECTION_MODE=y
CONFIG_ADXL367_INACTIVITY_DETECTION_MODE=n
CONFIG_ADXL367_ACTIVITY_THRESHOLD=50
CONFIG_ADXL367_ACTIVITY_TIME=10

# ==========================================================
# WI-FI & NATIVE NETWORKING STACK
# ==========================================================
CONFIG_SPI=y
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_NET_L2_WIFI_MGMT=y

CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_ETHERNET_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=10
CONFIG_NET_PKT_TX_COUNT=10
CONFIG_NET_BUF_RX_COUNT=20
CONFIG_NET_BUF_TX_COUNT=20

CONFIG_WIFI_SCAN_BANDS_LIST="2,5"
CONFIG_WIFI_SCAN_INTERVAL_S=15

# ==========================================================
# LTE MODEM & SOCKET OFFLOADING (NEW)
# ==========================================================
CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT=y

CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# ==========================================================
# MQTT HELPER (NEW)
# ==========================================================
CONFIG_MQTT_HELPER=y
CONFIG_MQTT_CLEAN_SESSION=y

# ==========================================================
# DIAGNOSTICS: LOGGING SETTINGS
# ==========================================================
CONFIG_NET_LOG=y
CONFIG_WIFI_LOG_LEVEL_INF=y
CONFIG_WIFI_NRF70_LOG_LEVEL_INF=y