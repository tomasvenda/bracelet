# Logging
CONFIG_LOG=y

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=n
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_SOCKETS=y
CONFIG_POSIX_API=y

# Memory
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=2048

# Modem library
CONFIG_NRF_MODEM_LIB=y

# LTE link control
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_NETWORK_MODE_LTE_M_NBIOT=y

# MQTT
# Enable and configure the MQTT helper library 
CONFIG_MQTT_HELPER=y
CONFIG_MQTT_CLEAN_SESSION=y

# Set the MQTT topics
CONFIG_MQTT_PUB_TOPIC="bracelet/prototype_1/data"
# CONFIG_MQTT_SUB_TOPIC="devacademy/subscribe/bracelet"
