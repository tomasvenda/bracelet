# Wi-Fi Core
CONFIG_WIFI=y
CONFIG_WIFI_NRF70=y
CONFIG_NET_L2_WIFI_MGMT=y

# Networking Stack
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y
CONFIG_NET_OFFLOAD=n
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_ETHERNET_MGMT=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096

# Physical Interface
CONFIG_SPI=y

# Memories
CONFIG_HEAP_MEM_POOL_SIZE=24576
CONFIG_MAIN_STACK_SIZE=4096

# Wi-Fi Scan Settings
CONFIG_WIFI_SCAN_BANDS_LIST="2,5"
CONFIG_WIFI_SCAN_INTERVAL_S=15

# Console & Logging
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y
CONFIG_LOG_MODE_IMMEDIATE=y